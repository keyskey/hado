---
id: cli-service
name: CLI Service
gates:
  - id: test.c0_coverage
    severity: major
    required: true
    threshold:
      min: 60
  - id: test.c1_coverage
    severity: major
    required: true
    threshold:
      min: 40
  - id: operations.owner_exists
    severity: critical
    required: true
  - id: operations.runbook_exists
    required: false
  - id: observability.monitor_exists
    required: false
  - id: infra.deployment_spec_exists
    required: false
  - id: release.rollback_plan_exists
    required: false
  - id: release.automation_declared
    severity: major
    required: true
