---
name: Lint

on:
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: YAML and Markdown
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install lint tools
        run: |
          python -m pip install --upgrade pip yamllint
          npm install --global markdownlint-cli2

      - name: Lint YAML
        run: yamllint .

      - name: Lint Markdown
        run: markdownlint-cli2

  go-lint:
    name: Go
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Check Go formatting
        run: |
          files="$(git ls-files '*.go')"
          if [ -z "$files" ]; then
            exit 0
          fi

          unformatted="$(gofmt -l $files)"
          if [ -n "$unformatted" ]; then
            echo "These Go files need gofmt:"
            echo "$unformatted"
            exit 1
          fi

      - name: Lint Go
        run: go vet ./...
