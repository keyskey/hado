---
name: Lint

on:
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: Format and static lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: make ci-lint
        run: make ci-lint
